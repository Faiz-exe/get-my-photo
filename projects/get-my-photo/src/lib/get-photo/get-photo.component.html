<div class="get-photo-root">
  @if (videoPreview) {
    <video
      autoplay
      playsinline
      id="captureFrame"
      [style.filter]="videoFilterStyle || null"></video>
  }

  @if (imagepreview) {
    <img [src]="src" alt="Captured preview" />
  }

  @if (error && showError) {
    <h3 class="error-text">{{ errorMessage }}</h3>
  }
</div>
