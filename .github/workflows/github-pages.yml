# Publishes the Angular demo from dist/lib-getMyPhoto.
# In the repo: Settings → Pages → Build and deployment → Source MUST be
# "GitHub Actions". If Source is "Deploy from a branch", GitHub serves the
# repo root (README) instead of this artifact — switch to GitHub Actions.
name: GitHub Pages

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build:pages

      - name: Verify Pages artifact
        run: |
          test -f dist/lib-getMyPhoto/index.html
          test -f dist/lib-getMyPhoto/404.html
          test -f dist/lib-getMyPhoto/.nojekyll
          ls -la dist/lib-getMyPhoto

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/lib-getMyPhoto

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
